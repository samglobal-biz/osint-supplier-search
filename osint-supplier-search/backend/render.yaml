services:
  - type: web
    name: osint-supplier-api
    runtime: python
    buildCommand: pip install poetry && poetry install --no-dev
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENCORPORATES_API_KEY
        sync: false

  - type: worker
    name: osint-supplier-worker
    runtime: python
    buildCommand: pip install poetry && poetry install --no-dev
    startCommand: python worker_main.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
